name: Check Management API Types

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          install: true
          cache: true
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Regenerate management API types
        run: pnpm --filter @supabase/mcp-server-supabase generate:management-api-types
      - name: Check for diff
        run: |
          if ! git diff --exit-code packages/mcp-server-supabase/src/management-api/types.ts; then
            echo "Management API types are out of date. Run 'pnpm generate:management-api-types' to update."
            exit 1
          fi
