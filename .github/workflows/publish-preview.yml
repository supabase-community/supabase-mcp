name: Publish preview

permissions:
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  preview:
    if: >
      github.repository == 'supabase-community/supabase-mcp' &&
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'publish-preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build packages
        run: pnpm build

      - name: Publish preview packages
        run: pnpm dlx pkg-pr-new@latest publish --pnpm --packageManager=pnpm './packages/mcp-utils' './packages/mcp-server-supabase' './packages/mcp-server-postgrest'
