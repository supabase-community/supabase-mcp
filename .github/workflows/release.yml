name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm OIDC trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

      # Everything below only runs when a release PR is merged

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: ${{ steps.release.outputs.releases_created }}

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        if: ${{ steps.release.outputs.releases_created }}
        with:
          install: true
          cache: true

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created }}
        run: pnpm install --frozen-lockfile

      - name: Build packages
        if: ${{ steps.release.outputs.releases_created }}
        run: pnpm --filter @supabase/mcp-utils --filter @supabase/mcp-server-supabase --filter @supabase/mcp-server-postgrest build

      - name: Publish @supabase/mcp-utils to npm
        if: ${{ steps.release.outputs.releases_created }}
        working-directory: packages/mcp-utils
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@supabase/mcp-utils@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "Version $VERSION already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --no-git-checks --ignore-scripts --access public --provenance

      - name: Publish @supabase/mcp-server-supabase to npm
        if: ${{ steps.release.outputs.releases_created }}
        working-directory: packages/mcp-server-supabase
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@supabase/mcp-server-supabase@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "Version $VERSION already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --no-git-checks --ignore-scripts --access public --provenance

      - name: Publish @supabase/mcp-server-postgrest to npm
        if: ${{ steps.release.outputs.releases_created }}
        working-directory: packages/mcp-server-postgrest
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@supabase/mcp-server-postgrest@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "Version $VERSION already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --no-git-checks --ignore-scripts --access public --provenance

      - name: Publish to MCP registry
        if: ${{ steps.release.outputs.releases_created }}
        working-directory: packages/mcp-server-supabase
        run: pnpm registry:publish
